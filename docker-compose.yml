version: '3.9'

services:

  backend:
    container_name: backend
    build: .
    ports:
      - '8000:8000'
    volumes:
      - .:/app
    restart: always
    environment:
      - .env

  db:
    image: postgres:18-alpine
    container_name: user_db
    restart: always
    shm_size: 128mb
    ports:
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data


volumes:
  pgdata: